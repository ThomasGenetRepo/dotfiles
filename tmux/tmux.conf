# Remap prefix from Ctrl-b to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reduce delay for escape-key sequences.
# Helps Neovim feel snappier inside tmux.
set -g escape-time 10

# Allows repeatable bindings, such as pane resize, to be repeated
# without pressing prefix each time.
set -g repeat-time 800

# Reload config with prefix + r
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Mouse support for pane resize/select
set -g mouse on

# Send copied text to the system clipboard via OSC 52
# WezTerm supports this.
set -g set-clipboard on

# Start numbering windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Bigger scrollback
set -g history-limit 10000

# Intuitive pane splits (| and - instead of % and ")
unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

# Vim-style window ("tab") navigation: prefix + h/l instead of prefix + p/n
unbind p
unbind n
bind h previous-window
bind l next-window

# Prefix + H/J/K/L resize panes repeatedly
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Alt + h/j/k/l raw tmux pane navigation, no prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- Status bar ---
# Placed on top so it doesn't collide with nvim's own status/command line
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#191724,fg=#908caa"

set -g status-left-length 30
set -g status-left "#[bg=#26233a,fg=#e0def4,bold] #S #[bg=#191724,fg=#191724]"

set -g status-right-length 90
set -g status-right "#{prefix_highlight}#[fg=#908caa] #{cpu_icon} #{cpu_percentage} #{ram_icon} #{ram_percentage} #[fg=#6e6a86]│#[fg=#908caa] #{net_speed} #[fg=#6e6a86]│#[fg=#908caa] %Y-%m-%d %H:%M "

# Tighten net-speed padding
set -g @net_speed_format "↓%5s ↑%5s"

setw -g window-status-format "#[fg=#6e6a86] #I:#W "
setw -g window-status-current-format "#[bg=#26233a,fg=#e0def4,bold] #I:#W "

# --- Pane borders ---
set -g pane-border-lines single

# Do not show pane title/index in borders
set -g pane-border-status off
set -g pane-border-format ""

# Dim inactive borders, purple active border
set -g pane-border-style "fg=#26233a"
set -g pane-active-border-style "fg=#c4a7e7"

# Dim inactive pane contents
set -g window-style "fg=#6e6a86,bg=#191724"
set -g window-active-style "fg=#e0def4,bg=#191724"

# Tell terminal apps when their pane gains/loses focus.
set -g focus-events on

# --- Plugins ---
# TPM itself
set -g @plugin 'tmux-plugins/tpm'

# Seamless vim-style pane navigation with Ctrl-h/j/k/l, no prefix needed.
# Also integrates with Neovim splits if you install the matching
# christoomey/vim-tmux-navigator plugin on the nvim side.
set -g @plugin 'christoomey/vim-tmux-navigator'

# Visual indicator in the status bar when prefix (Ctrl-a) is active
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @prefix_highlight_fg '#191724'
set -g @prefix_highlight_bg '#c4a7e7'

# Fuzzy session/window/pane switcher, prefix + F to launch.
# Requires the fzf binary installed on the system.
set -g @plugin 'sainnhe/tmux-fzf'

# CPU + RAM in the status bar
set -g @plugin 'tmux-plugins/tmux-cpu'

# RAM gets distinct icons
set -g @ram_low_icon "░"
set -g @ram_medium_icon "▒"
set -g @ram_high_icon "▓"

# Network up/down speed in the status bar
set -g @plugin 'tmux-plugins/tmux-net-speed'
set -g @net_speed_interfaces "eth0"

# Initialize TPM (must stay at the very bottom of the file)
run '~/.tmux/plugins/tpm/tpm'
